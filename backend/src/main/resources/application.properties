spring.application.name=Helpi
# Railway inyecta el puerto dinßmico. Si estamos en local, usamos el 8080.
server.port=${PORT:8080}

# Conexiˇn dinßmica a la BD
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:helpi}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:${DB_USER}}
spring.datasource.password=${MYSQLPASSWORD:${DB_PASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hacemos que el archivo env local sea "opcional" para que no explote en la nube si no lo subimos al repositorio
spring.config.import=optional:file:env.properties

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.sql.init.mode=never
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy