<header class="modern-header">
  <div class="header-container">
    
    <div class="header-left">
      <h2 class="page-title">Panel de Control</h2>
    </div>

    <div class="header-actions">

      <div class="notification-wrapper">
        <button class="icon-btn" (click)="toggleNotifications()" title="Notificaciones" [class.active]="showNotifications">
          <span class="material-icons-round">notifications</span>
          <span class="badge-dot" *ngIf="unreadCount > 0"></span>
        </button>
        
        <div *ngIf="showNotifications" class="dropdown-panel notification-dropdown">
          <div class="dropdown-header">
            <h3>Notificaciones</h3>
            <button class="text-btn" (click)="markAllAsRead()">Marcar leídas</button>
          </div>
          
          <div class="notification-list">
            <div *ngFor="let notification of notifications" 
                 class="notification-item" 
                 [class.unread]="!notification.isRead"
                 (click)="markAsRead(notification.id)">
              <div class="notification-icon" [ngClass]="notification.type">
                <span class="material-icons-round">{{ getNotificationIcon(notification.type) }}</span>
              </div>
              <div class="notification-content">
                <p class="notif-title">{{ notification.title }}</p>
                <p class="notif-desc">{{ notification.description }}</p>
                <span class="notif-time">{{ getTimeAgo(notification.timestamp) }}</span>
              </div>
            </div>

            <div *ngIf="notifications.length === 0" class="empty-state">
              <span class="material-icons-round">notifications_off</span>
              <p>Sin novedades</p>
            </div>
          </div>
          
          <div class="dropdown-footer">
            <button class="text-btn w-full">Ver todas</button>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="user-wrapper">
        <button class="user-btn" (click)="toggleDropdown()" [class.active]="showDropdown">
          <div class="user-info-text">
            <span class="u-name">{{ userFullName }}</span>
            <span class="u-role">{{ userRole }}</span>
          </div>
          <div class="user-avatar-frame">
            <img [src]="userAvatar" [alt]="userFullName">
            <div class="status-dot"></div>
          </div>
          <span class="material-icons-round arrow" [class.rotated]="showDropdown">expand_more</span>
        </button>
        
        <div *ngIf="showDropdown" class="dropdown-panel user-dropdown">
          <div class="user-dropdown-header">
            <div class="big-avatar">
              <img [src]="userAvatar" [alt]="userFullName">
            </div>
            <div class="big-info">
              <h4>{{ userFullName }}</h4>
              <span class="status-badge">En línea</span>
            </div>
          </div>
          
          <div class="dropdown-links">
            <button class="dropdown-link">
              <span class="material-icons-round">person</span> Mi Perfil
            </button>
            <button class="dropdown-link">
              <span class="material-icons-round">settings</span> Configuración
            </button>
            <div class="link-divider"></div>
            <button class="dropdown-link danger" (click)="logout()">
              <span class="material-icons-round">logout</span> Cerrar Sesión
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</header>
